<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Movie Explorer</title>

    <link
        rel="stylesheet"
        href="css/style.css"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    >

</head>

<body>

    <!-- HERO -->

    <header>

        <h1>
            🎬 Movie Explorer
        </h1>

        <p>
            Discover your favorite movies instantly.
        </p>

    </header>


    <!-- SEARCH -->

    <section class="search-section">

        <input
            type="text"
            id="searchInput"
            placeholder="Search movies..."
        >

        <button id="searchBtn">

            <i class="fa-solid fa-magnifying-glass"></i>

        </button>

    </section>


    <!-- LOADING -->

    <div id="loading" class="loading hidden">

        <div class="spinner"></div>

        <p>Loading movies...</p>

    </div>


    <!-- ERROR -->

    <p
        id="error"
        class="error"
    ></p>


    <!-- MOVIES -->

    <main
        id="movieContainer"
        class="movie-grid"
    >

    </main>


    <!-- LOAD MORE -->

    <div class="load-more">

        <button
            id="loadMoreBtn"
            class="hidden"
        >

            Load More

        </button>

    </div>


    <!-- FAVORITES -->

    <section class="favorites-section">

        <h2>

            ❤️ Favorites

        </h2>

        <div
            id="favoritesContainer"
            class="movie-grid"
        >

        </div>

    </section>


    <script
        type="module"
        src="js/app.js"
    ></script>

</body>

</html>
